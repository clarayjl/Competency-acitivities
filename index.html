const COLORS = {"마케팅·홍보": {"bg": "#EEF2FF", "accent": "#4F46E5", "light": "#C7D2FE"}, "회계·재무": {"bg": "#ECFDF5", "accent": "#059669", "light": "#A7F3D0"}, "인사·조직": {"bg": "#FFF7ED", "accent": "#EA580C", "light": "#FED7AA"}, "기획(IT·사업)": {"bg": "#F0F9FF", "accent": "#0284C7", "light": "#BAE6FD"}, "금융·투자": {"bg": "#FFFBEB", "accent": "#D97706", "light": "#FDE68A"}, "상담·심리·복지": {"bg": "#FDF2F8", "accent": "#DB2777", "light": "#FBCFE8"}, "서비스·항공": {"bg": "#F0FDFA", "accent": "#0D9488", "light": "#99F6E4"}, "기타전문직": {"bg": "#F5F3FF", "accent": "#7C3AED", "light": "#DDD6FE"}};

let selected = "마케팅·홍보";
let scope = "all";

function render() {
  const d = DATA[selected];
  const c = COLORS[selected];

  document.getElementById("jobTabs").innerHTML = Object.keys(DATA).map(j =>
    `<button class="job-tab ${j===selected?'active':''}" onclick="selectJob('${j}')" style="${j===selected?`background:${COLORS[j].accent}`:''}"> ${j}</button>`
  ).join("");

  document.getElementById("summaryBar").innerHTML = `
    <div><span class="summary-title" style="color:${c.accent}">${selected}</span><span class="summary-meta">참고 학생 ${d.students}명 · 활동사례 ${d.total}건</span></div>
    <div class="scope-btns">
      <button class="scope-btn ${scope==='all'?'active':''}" onclick="setScope('all')" style="${scope==='all'?`background:${c.accent};border-color:transparent`:''}">전체</button>
      <button class="scope-btn ${scope==='교내'?'active':''}" onclick="setScope('교내')" style="${scope==='교내'?'background:#059669;border-color:transparent':''}">교내</button>
      <button class="scope-btn ${scope==='교외'?'active':''}" onclick="setScope('교외')" style="${scope==='교외'?'background:#D97706;border-color:transparent':''}">교외</button>

  all.sort((a,b)=>b.count-a.count);

  document.getElementById("cards").innerHTML = all.map(a => `
    <div class="card">
      <div class="card-top">
        <div class="card-left">
          <span class="scope-badge ${a.scope}">${a.scope}</span>

  `).join("");
}
